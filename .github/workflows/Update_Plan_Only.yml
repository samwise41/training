name: 01.2 Quick Plan Update (No Garmin)

on:
  # Automatically run this action whenever you edit and push your plan doc!
  push:
    paths:
      - 'endurance_plan.md'
      - 'data/current_week.md'
  # Also gives you a button to trigger it manually in the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quick-update:
    runs-on: ubuntu-latest # Safe to run in the cloud since it bypasses Garmin!
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas garminconnect tabulate

    - name: Run Orchestrator (Skipping Garmin)
      env:
        # This is the magic flag that tells Python to skip the API calls
        SKIP_GARMIN: "true" 
      run: |
        python python/main.py

    - name: Commit and Push Database Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Add the updated data folders
        git add data/
        
        # Commit only if the markdown changes actually altered the JSON database
        git commit -m "📝 App updated: Processed new Endurance Plan data" || echo "No DB changes to commit"
        
        # Push back to the repository
        git pull --rebase
        git push
