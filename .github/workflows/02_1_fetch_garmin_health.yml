name: 02.1 Daily Health Sync

on:
  schedule:
    # Runs at 06:00 UTC daily (adjust as needed)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-health:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # --- 1. Restore the hidden GitHub cache (if it exists) ---
    - name: Cache Garmin Tokens
      uses: actions/cache@v3
      with:
        path: garmin_tokens
        key: garmin-tokens-${{ github.run_id }}
        restore-keys: |
          garmin-tokens-

    # --- 2. Inject local tokens (Bulletproof Python Method) ---
    - name: Reconstruct Local Tokens
      env:
        GARMIN_OAUTH1: ${{ secrets.GARMIN_OAUTH1 }}
        GARMIN_OAUTH2: ${{ secrets.GARMIN_OAUTH2 }}
      run: |
        python -c "
        import os
        o1 = os.environ.get('GARMIN_OAUTH1', '').strip()
        o2 = os.environ.get('GARMIN_OAUTH2', '').strip()
        if o1 and o2:
            os.makedirs('garmin_tokens', exist_ok=True)
            with open('garmin_tokens/oauth1_token.json', 'w') as f: f.write(o1)
            with open('garmin_tokens/oauth2_token.json', 'w') as f: f.write(o2)
            with open('garmin_tokens/domain.json', 'w') as f: f.write('\"garmin.com\"')
            print('✅ Tokens constructed safely!')
        else:
            print('⚠️ ERROR: GitHub Secrets are empty or missing!')
        "

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas garminconnect requests

    - name: Run Health Fetcher
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      run: |
        python python/_02_fetch_health.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Stage the new JSON file
        git add garmin_data/garmin_health.json
        
        # Commit only if there are changes
        git commit -m "🏥 Daily Health & Readiness Update" || echo "No health changes to commit"
        
        # Push
        git pull --rebase
        git push
