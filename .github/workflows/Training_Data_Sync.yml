name: 01.1 Training Data Sync

on:
  schedule:
    # Run at 6:00, 7:00, 8:00, 9:00, 10:00, 11:00 MST
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: self-hosted

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # --- 1. Restore the hidden GitHub cache ---
    - name: Cache Garmin Tokens
      uses: actions/cache@v3
      with:
        path: garmin_tokens
        key: garmin-tokens-${{ github.run_id }}
        restore-keys: |
          garmin-tokens-

    # --- 2. Inject local tokens (Hardcoded Path Method) ---
    - name: Reconstruct Local Tokens
      env:
        GARMIN_OAUTH1: ${{ secrets.GARMIN_OAUTH1 }}
        GARMIN_OAUTH2: ${{ secrets.GARMIN_OAUTH2 }}
      run: |
        & "C:\Users\samwi\AppData\Local\Programs\Python\Python314\python.exe" -c "
        import os
        o1 = os.environ.get('GARMIN_OAUTH1', '').strip()
        o2 = os.environ.get('GARMIN_OAUTH2', '').strip()
        if o1 and o2:
            os.makedirs('garmin_tokens', exist_ok=True)
            with open('garmin_tokens/oauth1_token.json', 'w') as f: f.write(o1)
            with open('garmin_tokens/oauth2_token.json', 'w') as f: f.write(o2)
            with open('garmin_tokens/domain.json', 'w') as f: f.write('\"garmin.com\"')
            print('✅ Tokens constructed safely!')
        else:
            print('⚠️ ERROR: GitHub Secrets are empty or missing!')
        "

    - name: Install Dependencies
      run: |
        & "C:\Users\samwi\AppData\Local\Programs\Python\Python314\python.exe" -m pip install --upgrade pip
        & "C:\Users\samwi\AppData\Local\Programs\Python\Python314\python.exe" -m pip install pandas garminconnect tabulate

    - name: Run Training Plan Orchestrator
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
        STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      run: |
        & "C:\Users\samwi\AppData\Local\Programs\Python\Python314\python.exe" python/main.py
