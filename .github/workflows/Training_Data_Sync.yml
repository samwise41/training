name: 01.1 Training Data Sync

on:
  schedule:
    # Run at 6:00, 7:00, 8:00, 9:00, 10:00, 11:00 MST
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # --- 1. Restore the hidden GitHub cache (if it exists) ---
    - name: Cache Garmin Tokens
      uses: actions/cache@v3
      with:
        path: garmin_tokens
        key: garmin-tokens-${{ github.run_id }}
        restore-keys: |
          garmin-tokens-

    # --- 2. Inject local tokens to bypass 429 Firewall ---
    - name: Reconstruct Local Tokens
      env:
        GARMIN_OAUTH1: ${{ secrets.GARMIN_OAUTH1 }}
        GARMIN_OAUTH2: ${{ secrets.GARMIN_OAUTH2 }}
      run: |
        # Only build the folder if the secrets exist
        if [ -n "$GARMIN_OAUTH1" ]; then
          mkdir -p garmin_tokens
          echo "$GARMIN_OAUTH1" > garmin_tokens/oauth1_token.json
          echo "$GARMIN_OAUTH2" > garmin_tokens/oauth2_token.json
          
          # The missing domain file!
          echo '"garmin.com"' > garmin_tokens/domain.json
          
          echo "✅ Successfully injected local Garmin tokens!"
        fi

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas garminconnect tabulate

    - name: Run Training Plan Orchestrator
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
        STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      run: |
        # Run the new modular main script
        python python/main.py
