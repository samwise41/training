name: 02.1 Daily Health Sync

on:
  schedule:
    # Runs at 06:00 UTC daily (adjust as needed)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-health:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # --- 1. Restore the hidden GitHub cache (if it exists) ---
    - name: Cache Garmin Tokens
      uses: actions/cache@v3
      with:
        path: garmin_tokens
        key: garmin-tokens-${{ github.run_id }}
        restore-keys: |
          garmin-tokens-

    # --- 2. Inject local tokens to bypass 429 Firewall ---
    - name: Reconstruct Local Tokens
      env:
        GARMIN_OAUTH1: ${{ secrets.GARMIN_OAUTH1 }}
        GARMIN_OAUTH2: ${{ secrets.GARMIN_OAUTH2 }}
      run: |
        # Only build the folder if the secrets exist
        if [ -n "$GARMIN_OAUTH1" ]; then
          mkdir -p garmin_tokens
          echo "$GARMIN_OAUTH1" > garmin_tokens/oauth1_token.json
          echo "$GARMIN_OAUTH2" > garmin_tokens/oauth2_token.json
          
          # The missing domain file!
          echo '"garmin.com"' > garmin_tokens/domain.json
          
          echo "✅ Successfully injected local Garmin tokens!"
        fi

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas garminconnect requests

    - name: Run Health Fetcher
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      run: |
        python python/_02_fetch_health.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Stage the new JSON file
        git add garmin_data/garmin_health.json
        
        # Commit only if there are changes
        git commit -m "🏥 Daily Health & Readiness Update" || echo "No health changes to commit"
        
        # Push
        git pull --rebase
        git push
